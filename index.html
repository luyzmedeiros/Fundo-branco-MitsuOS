<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redirector</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }
    </style>
</head>
<body>

    <script>
        const TARGET_URL = "https://luyzmedeiros.github.io/Fundo-branco-MitsuOS/";

        function checkAndRedirect() {
            const agora = new Date();
            const hora = agora.getHours();
            const minuto = agora.getMinutes();

            const minutosAtuais = (hora * 60) + minuto;
            const inicio = 271;
            const fim = 1079;

            if (minutosAtuais >= inicio && minutosAtuais <= fim) {
                if (navigator.onLine) {
                    window.location.href = TARGET_URL;
                } else {
                    console.log("Aguardando estabilidade da internet...");
                }
            }
        }

        // --- Novas funções de controle ---

        // Recarrega a página a cada 1 segundo (1000ms)
        setInterval(() => {
            location.reload();
        }, 1000);

        // Bloqueia o zoom via teclado
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0')) {
                e.preventDefault();
            }
        });

        // Bloqueia o zoom via roda do mouse
        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Verifica o redirecionamento imediatamente ao carregar
        checkAndRedirect();

        // Tenta redirecionar assim que a internet voltar
        window.addEventListener('online', checkAndRedirect);
    </script>
</body>
</html>
