<script>
    function verificarHorario() {
        const agora = new Date();
        const minutosAtuais = (agora.getHours() * 60) + agora.getMinutes();

        const inicioNoite = 1080; // 18:00
        const fimMadrugada = 270;  // 04:30

        // Se entrar aqui, ele redireciona e PARA o script imediatamente
        if (minutosAtuais >= inicioNoite || minutosAtuais <= fimMadrugada) {
            window.location.replace("https://luyzmedeiros.github.io/Fundo-preto-MitsuOS/");
            return; 
        }
    }
    verificarHorario();
</script>
