<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MitsuOS - Modo Claro</title>
    <style>
        /* Define o fundo branco imediatamente */
        body {
            background-color: #ffffff;
            margin: 0;
            height: 100vh;
        }
    </style>
</head>
<body>

    <script>
        function verificarHorario() {
            const agora = new Date();
            const horas = agora.getHours();
            const minutos = agora.getMinutes();

            // Cálculo em minutos totais:
            // 4:31h = 271 min
            // 17:59h = 1079 min
            const minutosAtuais = (horas * 60) + minutos;
            const inicio = (4 * 60) + 31;
            const fim = (17 * 60) + 59;

            // Se estiver entre 04:31 e 17:59, vai para o fundo PRETO
            if (minutosAtuais >= inicio && minutosAtuais <= fim) {
                window.location.href = "https://luyzmedeiros.github.io/Fundo-preto-MitsuOS/";
            }
        }

        // Executa a verificação
        verificarHorario();
    </script>
</body>
</html>
