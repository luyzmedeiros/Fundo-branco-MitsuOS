<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: white; margin: 0; }
    </style>
</head>
<body>
    <script>
        function validar() {
            const agora = new Date();
            const min = (agora.getHours() * 60) + agora.getMinutes();
            
            // 18:00 (1080 min) até 04:30 (270 min)
            if (min >= 1080 || min <= 270) {
                window.location.href = "https://luyzmedeiros.github.io/Fundo-preto-MitsuOS/";
            } else {
                setTimeout(() => { location.reload(); }, 3000);
            }
        }
        validar();
    </script>
</body>
</html>
