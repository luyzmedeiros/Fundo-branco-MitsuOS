<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MitsuOS - Redirecionamento</title>
    <style>
        body {
            background-color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <p id="status">Aguardando horário programado...</p>

    <script>
        function verificarHorario() {
            const agora = new Date();
            const horas = agora.getHours();
            const minutos = agora.getMinutes();
            const segundos = agora.getSeconds(); // Adicionado para precisão
            
            // Converte tudo para minutos totais
            const tempoAtualEmMinutos = (horas * 60) + minutos;
            
            const limiteInicio = 18 * 60;          // 18:00h
            const limiteFim = (4 * 60) + 30;       // 04:30h

            /* Lógica: Verifica se está no intervalo de redirecionamento.
            */
            if (tempoAtualEmMinutos >= limiteInicio || tempoAtualEmMinutos <= limiteFim) {
                console.log("Horário atingido! Redirecionando...");
                window.location.href = "https://luyzmedeiros.github.io/Fundo-preto-MitsuOS/";
            } else {
                // Apenas para feedback visual no console de que o script está rodando
                console.log(`Hora atual: ${horas}:${minutos}:${segundos} - Fora do intervalo.`);
            }
        }

        // 1. Executa assim que a página carrega
        window.onload = () => {
            verificarHorario();
            
            // 2. Verifica a cada 1000 milissegundos (1 segundo)
            // Assim, se o relógio do PC mudar, ele percebe na hora.
            setInterval(verificarHorario, 1000);
        };
    </script>
</body>
</html>
